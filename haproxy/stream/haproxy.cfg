global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    tcp
    option  tcplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend ft_https
    bind *:443
    mode tcp
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }

    acl is_reality req.ssl_sni -i www.google.com google.com
    use_backend bk_xray if is_reality

    acl is_site1 req.ssl_sni -i site1.com
    use_backend bk_haproxy_web if is_site1

    default_backend bk_blackhole

backend bk_xray
    mode tcp
    server xray 127.0.0.1:10443

backend bk_haproxy_web
    mode tcp
    server haproxy_web 127.0.0.1:8443

backend bk_blackhole
    mode tcp
